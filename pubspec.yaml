name: z_hub
description: ZHub - 多模块文件管理器，WiFi 快传 + 文件管理
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # File system & paths
  path_provider: ^2.1.5
  path: ^1.9.1

  # WiFi Transfer - HTTP server
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_static: ^1.1.3

  # File operations
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  open_filex: ^4.5.0
  mime: ^2.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Local database for file metadata cache
  sqflite: ^2.4.1

  # Utilities
  intl: ^0.19.0

  # Network info for WiFi transfer
  network_info_plus: ^6.1.2
  sqflite_common_ffi: ^2.3.7+1
  win32audio: ^1.5.0
  flutter_soloud: ^4.0.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
