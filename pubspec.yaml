name: z_hub
description: ZHub - 多模块文件管理器，WiFi 快传 + 文件管理
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # File system & paths
  path_provider: ^2.1.5
  path: ^1.9.1

  # WiFi Transfer - HTTP server
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # File operations
  file_picker: ^8.1.7
  mime: ^2.0.0

  # Local database for file metadata cache
  sqflite: ^2.4.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.4

  sqflite_common_ffi: 2.3.2
  flutter_soloud: ^4.0.6

  # PDF Viewer
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
